<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Details etudiant</h2>
    <button class="btn btn-outline-secondary" (click)="goToList()">
      <i class="bi bi-arrow-left"></i> Retour a la liste
    </button>
  </div>

  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
    <p class="text-muted mt-3 mb-0">Chargement des details...</p>
  </div>

  <div class="alert alert-danger" *ngIf="!loading && errorMessage">
    {{ errorMessage }}
  </div>

  <div class="card shadow-sm" *ngIf="!loading && etudiant">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <p class="mb-1 text-muted">Nom</p>
          <p class="fw-semibold">{{ etudiant.nom }}</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1 text-muted">Prenom</p>
          <p class="fw-semibold">{{ etudiant.prenom }}</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1 text-muted">Email</p>
          <p class="fw-semibold">{{ etudiant.email }}</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1 text-muted">Matricule</p>
          <p class="fw-semibold">{{ etudiant.matricule }}</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1 text-muted">Filiere</p>
          <p class="fw-semibold">{{ etudiant.filiere }}</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1 text-muted">Niveau</p>
          <p class="fw-semibold">{{ etudiant.niveau }}</p>
        </div>
      </div>
    </div>
    <div class="card-footer bg-white border-top-0 pb-3">
      <button class="btn btn-primary" (click)="goToEdit()">
        <i class="bi bi-pencil"></i> Modifier
      </button>
    </div>
  </div>
</div>
