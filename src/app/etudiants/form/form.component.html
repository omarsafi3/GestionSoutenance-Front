<section class="page-header">
  <h1>{{ isEditMode ? 'Modifier un etudiant' : 'Ajouter un etudiant' }}</h1>
  <p>Profil etudiant, compte de connexion et encadrant associe.</p>
</section>

<section class="panel">
  <p class="status err" *ngIf="errorMessage">
    <lucide-icon name="circle-alert" [size]="18"></lucide-icon>
    {{ errorMessage }}
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">
    <label>Nom
      <input formControlName="nom" placeholder="Nom" [class.is-invalid]="isFieldInvalid('nom')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('nom')">{{ getFieldError('nom') }}</span>
    </label>

    <label>Prenom
      <input formControlName="prenom" placeholder="Prenom" [class.is-invalid]="isFieldInvalid('prenom')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('prenom')">{{ getFieldError('prenom') }}</span>
    </label>

    <label>Email
      <input type="email" formControlName="email" placeholder="nom@example.com" [class.is-invalid]="isFieldInvalid('email')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('email')">{{ getFieldError('email') }}</span>
    </label>

    <label>Mot de passe {{ isEditMode ? '(laisser vide pour ne pas changer)' : '' }}
      <input type="password" formControlName="password" autocomplete="new-password" [class.is-invalid]="isFieldInvalid('password')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('password')">{{ getFieldError('password') }}</span>
    </label>

    <label>Matricule
      <input formControlName="matricule" placeholder="GL2026001" [class.is-invalid]="isFieldInvalid('matricule')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('matricule')">{{ getFieldError('matricule') }}</span>
    </label>

    <label>Filiere
      <select formControlName="filiere" [class.is-invalid]="isFieldInvalid('filiere')">
        <option value="">Choisir une filiere</option>
        <option *ngFor="let f of filieres" [value]="f">{{ f }}</option>
      </select>
      <span class="invalid-feedback" *ngIf="isFieldInvalid('filiere')">{{ getFieldError('filiere') }}</span>
    </label>

    <label>Niveau
      <select formControlName="niveau" [class.is-invalid]="isFieldInvalid('niveau')">
        <option value="">Choisir un niveau</option>
        <option *ngFor="let n of niveaux" [value]="n">{{ n }}</option>
      </select>
      <span class="invalid-feedback" *ngIf="isFieldInvalid('niveau')">{{ getFieldError('niveau') }}</span>
    </label>

    <label>Encadrant
      <select formControlName="encadrantId" [class.is-invalid]="isFieldInvalid('encadrantId')">
        <option [ngValue]="null">Choisir un encadrant</option>
        <option *ngFor="let e of enseignants" [ngValue]="e.id">{{ encadrantLabel(e) }}</option>
      </select>
      <span class="invalid-feedback" *ngIf="isFieldInvalid('encadrantId')">{{ getFieldError('encadrantId') }}</span>
    </label>

    <div class="actions-row">
      <button class="btn-primary" type="submit" [disabled]="form.invalid || loading">
        {{ isEditMode ? 'Enregistrer' : 'Creer' }}
      </button>
      <button class="btn-light" type="button" (click)="cancel()" [disabled]="loading">Annuler</button>
    </div>
  </form>
</section>
