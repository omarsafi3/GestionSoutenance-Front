<div class="container form-page mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <div class="mb-4 form-header">
        <span class="header-chip">
          <i class="bi bi-mortarboard"></i> Module Étudiants
        </span>

        <h2 class="display-6">
          {{ isEditMode ? 'Modifier Étudiant' : 'Ajouter un Étudiant' }}
        </h2>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="card shadow-lg form-card">
        <div class="card-body p-4">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <!-- NOM -->
            <div class="mb-3">
              <label class="form-label">Nom *</label>
              <input class="form-control" formControlName="nom">
            </div>

            <!-- PRENOM -->
            <div class="mb-3">
              <label class="form-label">Prénom *</label>
              <input class="form-control" formControlName="prenom">
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input class="form-control" formControlName="email">
            </div>

            <!-- MATRICULE -->
            <div class="mb-3">
              <label class="form-label">Matricule *</label>
              <input class="form-control" formControlName="matricule">
            </div>

            <!-- FILIERE -->
            <div class="mb-3">
              <label class="form-label">Filière *</label>
              <select class="form-select" formControlName="filiere">
                <option value="">-- choisir --</option>
                <option *ngFor="let f of filieres" [value]="f">{{ f }}</option>
              </select>
            </div>

            <!-- NIVEAU -->
            <div class="mb-3">
              <label class="form-label">Niveau *</label>
              <select class="form-select" formControlName="niveau">
                <option value="">-- choisir --</option>
                <option *ngFor="let n of niveaux" [value]="n">{{ n }}</option>
              </select>
            </div>

            <!-- ENCADRANT -->
            <div class="mb-3">
              <label class="form-label">Encadrant *</label>

              <select class="form-select" formControlName="encadrantId">
                <option value="">-- choisir un encadrant --</option>

                <option *ngFor="let e of enseignants" [value]="e.id">
                  {{ e.id }}
                </option>
              </select>
            </div>

            <div class="d-flex gap-2 justify-content-end">
              <button type="button" class="btn btn-secondary" (click)="cancel()">
                Annuler
              </button>

              <button type="submit" class="btn btn-primary">
                {{ isEditMode ? 'Modifier' : 'Créer' }}
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
