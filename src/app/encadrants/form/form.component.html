<section class="page-header">
  <h1>{{ isEditMode ? 'Modifier un encadrant' : 'Ajouter un encadrant' }}</h1>
  <p>Profil enseignant encadrant, compte de connexion et specialite principale.</p>
</section>

<section class="panel">
  <p class="status ok" *ngIf="successMessage">
    <lucide-icon name="circle-check" [size]="18"></lucide-icon>
    {{ successMessage }}
  </p>

  <p class="status err" *ngIf="errorMessage">
    <lucide-icon name="circle-alert" [size]="18"></lucide-icon>
    {{ errorMessage }}
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">
    <label>Nom
      <input formControlName="nom" placeholder="Nom" [class.is-invalid]="isFieldInvalid('nom')" [disabled]="loading">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('nom')">{{ getFieldError('nom') }}</span>
    </label>

    <label>Prenom
      <input formControlName="prenom" placeholder="Prenom" [class.is-invalid]="isFieldInvalid('prenom')" [disabled]="loading">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('prenom')">{{ getFieldError('prenom') }}</span>
    </label>

    <label>Email
      <input type="email" formControlName="email" placeholder="nom@example.com" [class.is-invalid]="isFieldInvalid('email')" [disabled]="loading">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('email')">{{ getFieldError('email') }}</span>
    </label>

    <label>Mot de passe {{ isEditMode ? '(laisser vide pour ne pas changer)' : '' }}
      <input type="password" formControlName="password" autocomplete="new-password" [class.is-invalid]="isFieldInvalid('password')" [disabled]="loading">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('password')">{{ getFieldError('password') }}</span>
    </label>

    <label>Grade
      <select formControlName="grade" [class.is-invalid]="isFieldInvalid('grade')" [disabled]="loading">
        <option value="">Choisir un grade</option>
        <option *ngFor="let grade of grades" [value]="grade">{{ grade }}</option>
      </select>
      <span class="invalid-feedback" *ngIf="isFieldInvalid('grade')">{{ getFieldError('grade') }}</span>
    </label>

    <label>Specialite
      <select formControlName="specialite" [class.is-invalid]="isFieldInvalid('specialite')" [disabled]="loading">
        <option value="">Choisir une specialite</option>
        <option *ngFor="let specialite of specialites" [value]="specialite">{{ specialite }}</option>
      </select>
      <span class="invalid-feedback" *ngIf="isFieldInvalid('specialite')">{{ getFieldError('specialite') }}</span>
    </label>

    <div class="actions-row">
      <button class="btn-primary" type="submit" [disabled]="form.invalid || loading">
        {{ isEditMode ? 'Enregistrer' : 'Creer' }}
      </button>
      <button class="btn-light" type="button" (click)="cancel()" [disabled]="loading">Annuler</button>
    </div>
  </form>
</section>
