<section class="page-header">
  <div>
    <h1>Details encadrant</h1>
    <p>Fiche profil, grade et specialite d'encadrement.</p>
  </div>
</section>

<section class="panel">
  <div class="actions-row !mt-0 !mb-4">
    <button class="btn-light" type="button" (click)="goToList()">
      <lucide-icon name="arrow-left" [size]="18"></lucide-icon>
      Retour
    </button>
    <button class="btn-primary" type="button" *ngIf="encadrant" (click)="goToEdit()">
      Modifier
    </button>
  </div>

  <div class="status ok" *ngIf="loading">
    <span class="spinner-border"></span>
    Chargement des details...
  </div>

  <p class="status err" *ngIf="!loading && errorMessage">{{ errorMessage }}</p>

  <div class="details-grid" *ngIf="!loading && encadrant">
    <article class="detail-block">
      <h3>Identite</h3>
      <dl>
        <div>
          <dt>Nom</dt>
          <dd>{{ encadrant.nom }}</dd>
        </div>
        <div>
          <dt>Prenom</dt>
          <dd>{{ encadrant.prenom }}</dd>
        </div>
        <div>
          <dt>Email</dt>
          <dd><a [href]="'mailto:' + encadrant.email">{{ encadrant.email }}</a></dd>
        </div>
      </dl>
    </article>

    <article class="detail-block">
      <h3>Enseignement</h3>
      <dl>
        <div>
          <dt>Grade</dt>
          <dd>{{ encadrant.grade }}</dd>
        </div>
        <div>
          <dt>Specialite</dt>
          <dd>{{ encadrant.specialite }}</dd>
        </div>
      </dl>
    </article>
  </div>
</section>
