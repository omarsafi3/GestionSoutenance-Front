<section class="page-header">
  <h1>{{ id ? 'Modifier une soutenance' : 'Ajouter une soutenance' }}</h1>
  <p>Planification de la session, jury, salle et etudiant concerne.</p>
</section>

<section class="panel">
  <p class="status err" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <label>Titre
      <input formControlName="titre" placeholder="Titre du projet" [class.is-invalid]="isFieldInvalid('titre')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('titre')">{{ getFieldError('titre') }}</span>
    </label>

    <label>Date
      <input type="datetime-local" formControlName="date" [class.is-invalid]="isFieldInvalid('date')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('date')">{{ getFieldError('date') }}</span>
    </label>

    <label>Duree
      <input type="number" formControlName="duree" placeholder="60" [class.is-invalid]="isFieldInvalid('duree')">
      <span class="invalid-feedback" *ngIf="isFieldInvalid('duree')">{{ getFieldError('duree') }}</span>
    </label>

    <label>Statut
      <select formControlName="statut">
        <option value="">Selectionner statut</option>
        <option value="PLANIFIEE">PLANIFIEE</option>
        <option value="EN_COURS">EN_COURS</option>
        <option value="TERMINEE">TERMINEE</option>
        <option value="ANNULEE">ANNULEE</option>
      </select>
    </label>

    <label>President
      <select formControlName="presidentId">
        <option value="">President</option>
        <option *ngFor="let e of enseignants" [value]="e.id">{{ e.nom }} {{ e.prenom }}</option>
      </select>
    </label>

    <label>Rapporteur
      <select formControlName="rapporteurId">
        <option value="">Rapporteur</option>
        <option *ngFor="let e of enseignants" [value]="e.id">{{ e.nom }} {{ e.prenom }}</option>
      </select>
    </label>

    <label>Examinateur
      <select formControlName="examinateurId">
        <option value="">Examinateur</option>
        <option *ngFor="let e of enseignants" [value]="e.id">{{ e.nom }} {{ e.prenom }}</option>
      </select>
    </label>

    <label>Salle
      <select formControlName="salleId">
        <option value="">Salle</option>
        <option *ngFor="let s of salles" [value]="s.id">{{ s.nom }} ({{ s.localisation }})</option>
      </select>
    </label>

    <label>Etudiant
      <select formControlName="etudiantId">
        <option value="">Etudiant</option>
        <option *ngFor="let et of etudiants" [value]="et.id">{{ et.nom }} {{ et.prenom }}</option>
      </select>
    </label>

    <div class="actions-row">
      <button class="btn-primary" type="submit" [disabled]="form.invalid || loading || isFinished">Enregistrer</button>
      <a class="btn-light" routerLink="/soutenances">Annuler</a>
    </div>
  </form>
</section>
