<section class="page-header">
  <div>
    <h1>Soutenances</h1>
    <p>Planning des soutenances, statuts et affectations principales.</p>
  </div>
</section>

<section class="panel">
  <div class="actions-row !mt-0 !mb-4" *ngIf="isAdmin">
    <button class="btn-primary" type="button" (click)="add()">Ajouter une soutenance</button>
  </div>

  <div class="status ok" *ngIf="loading">
    Chargement des soutenances...
  </div>

  <div class="table-responsive" *ngIf="!loading && soutenances.length">
    <table class="data-table">
      <thead>
        <tr>
          <th>Titre</th>
          <th>Date</th>
          <th>Duree</th>
          <th>Statut</th>
          <th *ngIf="isAdmin">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of soutenances">
          <td><strong>{{ s.titre }}</strong></td>
          <td>{{ s.date | date:'medium' }}</td>
          <td>{{ s.duree }} min</td>
          <td>
            <span class="badge" [ngClass]="statusClass(s.statut)">
              {{ s.statut }}
            </span>
          </td>
          <td *ngIf="isAdmin">
            <div class="actions-row !mt-0">
              <button class="btn-light btn-sm" type="button" (click)="edit(s.id)">Modifier</button>
              <button class="btn-danger btn-sm" type="button" (click)="delete(s.id)">Supprimer</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="status ok" *ngIf="!loading && !soutenances.length">Aucune soutenance disponible.</p>
</section>
