<section class="page-header">
  <div>
    <h1>Enseignants</h1>
    <p>Administration des enseignants disponibles pour les jurys.</p>
  </div>
</section>

<section class="panel">
  <div class="list-toolbar">
    <div class="stats-wrap compact">
      <div class="stat-pill">
        <span class="stat-label">Total</span>
        <span class="stat-value">{{ enseignants.length }}</span>
      </div>
    </div>

    <button class="btn-primary" type="button" (click)="add()">Ajouter un enseignant</button>
  </div>

  <div class="status ok" *ngIf="loading">
    Chargement des enseignants...
  </div>

  <div class="table-responsive" *ngIf="!loading && enseignants.length">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prenom</th>
          <th>Email</th>
          <th>Grade</th>
          <th>Specialite</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of enseignants">
          <td><strong>{{ e.nom }}</strong></td>
          <td>{{ e.prenom }}</td>
          <td><a [href]="'mailto:' + e.email">{{ e.email }}</a></td>
          <td><span class="badge bg-info">{{ e.grade || '-' }}</span></td>
          <td>{{ e.specialite || '-' }}</td>
          <td>
            <div class="actions-row !mt-0">
              <button class="btn-light btn-sm" type="button" (click)="edit(e.id)">Modifier</button>
              <button class="btn-danger btn-sm" type="button" (click)="delete(e.id)">Supprimer</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="status ok" *ngIf="!loading && !enseignants.length">Aucun enseignant disponible.</p>
</section>
