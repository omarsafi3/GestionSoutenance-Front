<section class="page-header">
  <div>
    <h1>Salles</h1>
    <p>Gestion des espaces de soutenance, capacites et disponibilites.</p>
  </div>
</section>

<section class="panel">
  <div class="list-toolbar">
    <div class="stats-wrap compact">
      <div class="stat-pill">
        <span class="stat-label">Total</span>
        <span class="stat-value">{{ salles.length }}</span>
      </div>
    </div>

    <button class="btn-primary" type="button" (click)="add()">Ajouter une salle</button>
  </div>

  <div class="status ok" *ngIf="loading">
    Chargement des salles...
  </div>

  <div class="table-responsive" *ngIf="!loading && salles.length">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Capacite</th>
          <th>Localisation</th>
          <th>Disponible</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of salles">
          <td><strong>{{ s.nom }}</strong></td>
          <td>{{ s.capacite }}</td>
          <td>{{ s.localisation || '-' }}</td>
          <td>
            <span class="badge" [class.bg-success]="s.disponible" [class.bg-secondary]="!s.disponible">
              {{ s.disponible ? 'Oui' : 'Non' }}
            </span>
          </td>
          <td>
            <div class="actions-row !mt-0">
              <button class="btn-light btn-sm" type="button" (click)="edit(s.id)">Modifier</button>
              <button class="btn-danger btn-sm" type="button" (click)="delete(s.id)">Supprimer</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="status ok" *ngIf="!loading && !salles.length">Aucune salle disponible.</p>
</section>
