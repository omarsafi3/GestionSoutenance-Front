<section class="page-header">
  <h1>{{ id ? 'Modifier une salle' : 'Ajouter une salle' }}</h1>
  <p>Renseigner les informations de capacite et de localisation.</p>
</section>

<section class="panel">
  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <label>Nom
      <input formControlName="nom" placeholder="Salle A1">
    </label>

    <label>Capacite
      <input type="number" formControlName="capacite" placeholder="40">
    </label>

    <label>Localisation
      <input formControlName="localisation" placeholder="Bloc principal">
    </label>

    <label class="toggle-field">
      <input type="checkbox" formControlName="disponible">
      <span>Disponible</span>
    </label>

    <div class="actions-row">
      <button class="btn-primary" type="submit" [disabled]="form.invalid">Enregistrer</button>
      <a class="btn-light" routerLink="/salles">Annuler</a>
    </div>
  </form>
</section>
