<div class="chatbot-root" [class.open]="open">
  <button class="chatbot-fab" type="button" (click)="toggle()" aria-label="Assistant">
    <lucide-icon [name]="open ? 'x' : 'bot'" [size]="20"></lucide-icon>
  </button>

  <section class="chatbot-panel" *ngIf="open">
    <header class="chatbot-header">
      <div>
        <strong>Assistant Soutenance</strong>
        <small>Gratuit, integre, oriente metier</small>
      </div>
    </header>

    <div class="chatbot-quick-actions">
      <button type="button" *ngFor="let action of quickActions" (click)="askQuick(action.prompt)">
        {{ action.label }}
      </button>
    </div>

    <div class="chatbot-messages" #messagesBox>
      <article *ngFor="let m of messages" [class.user]="m.sender === 'user'" [class.assistant]="m.sender === 'assistant'">
        <div class="chatbot-message-content" [innerHTML]="formatMessage(m.text)"></div>
      </article>
      <article class="assistant loading" *ngIf="loading">
        <div class="chatbot-message-content">
          <p>Je reflechis...</p>
        </div>
      </article>
    </div>

    <form class="chatbot-form" (ngSubmit)="send()">
      <input
        type="text"
        name="chatbotQuestion"
        [(ngModel)]="draft"
        placeholder="Ex: regles jury, ouvre notes, statuts"
        autocomplete="off"
      />
      <button type="submit" [disabled]="loading || !draft.trim()">
        <lucide-icon name="send" [size]="16"></lucide-icon>
      </button>
    </form>
  </section>
</div>
