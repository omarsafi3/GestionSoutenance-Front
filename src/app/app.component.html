<div class="app-shell" *ngIf="{ session: (session$ | async) } as state">
  <header class="topbar glass">
    <a class="brand" [routerLink]="homeLink(state.session)" aria-label="Accueil Gestion des Soutenances">
      <span class="brand-mark">
        <lucide-icon name="graduation-cap" [size]="24"></lucide-icon>
      </span>
      <span>
        <strong>Gestion Soutenance</strong>
        <small>SOA Academic Ops</small>
      </span>
    </a>

    <button class="nav-toggle" type="button" (click)="toggleNav()" [attr.aria-expanded]="navOpen" aria-label="Menu">
      <lucide-icon [name]="navOpen ? 'x' : 'menu'" [size]="22"></lucide-icon>
    </button>

    <nav class="primary-nav" [class.is-open]="navOpen" *ngIf="isAuthenticated(); else guestNav">
      <a *ngIf="canAccess(['ADMIN'])" [routerLink]="['/']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <lucide-icon name="layout-dashboard" [size]="18"></lucide-icon>
        Accueil
      </a>
      <a *ngIf="canAccess(['ADMIN'])" [routerLink]="['/etudiants']" routerLinkActive="active">
        <lucide-icon name="users" [size]="18"></lucide-icon>
        Etudiants
      </a>
      <a *ngIf="canAccess(['ADMIN'])" [routerLink]="['/enseignants']" routerLinkActive="active">
        <lucide-icon name="user-round-cog" [size]="18"></lucide-icon>
        Enseignants
      </a>
      <a [routerLink]="['/soutenances']" routerLinkActive="active">
        <lucide-icon name="calendar-days" [size]="18"></lucide-icon>
        Soutenances
      </a>

      <div class="nav-menu">
        <button type="button" (click)="toggleModules($event)" [class.active]="modulesOpen">
          <lucide-icon name="clipboard-list" [size]="18"></lucide-icon>
          Modules
        </button>
        <div class="nav-menu-panel" [class.is-open]="modulesOpen">
          <a *ngIf="canAccess(['ENSEIGNANT'])" [routerLink]="['/notes']" routerLinkActive="active">
            <lucide-icon name="file-text" [size]="17"></lucide-icon>
            Notes
          </a>
          <a *ngIf="canAccess(['ADMIN'])" [routerLink]="['/salles']" routerLinkActive="active">
            <lucide-icon name="building-2" [size]="17"></lucide-icon>
            Salles
          </a>
          <a [routerLink]="['/resultats']" routerLinkActive="active">
            <lucide-icon name="award" [size]="17"></lucide-icon>
            Resultats
          </a>
        </div>
      </div>
    </nav>

    <ng-template #guestNav>
      <nav class="primary-nav guest" [class.is-open]="navOpen">
        <a [routerLink]="['/login']" routerLinkActive="active">
          <lucide-icon name="log-in" [size]="18"></lucide-icon>
          Connexion
        </a>
      </nav>
    </ng-template>

    <div class="session-area" *ngIf="isAuthenticated(); else loginAction">
      <span class="session-pill" title="Session active">
        <lucide-icon name="user-circle" [size]="18"></lucide-icon>
        <span>{{ state.session?.username }}</span>
        <small>{{ state.session?.role }}</small>
      </span>
      <button class="logout-btn" type="button" (click)="logout()" title="Deconnexion">
        <lucide-icon name="log-out" [size]="18"></lucide-icon>
        <span>Deconnexion</span>
      </button>
    </div>

    <ng-template #loginAction>
      <a class="login-action" [routerLink]="['/login']">
        <lucide-icon name="log-in" [size]="18"></lucide-icon>
        Connexion
      </a>
    </ng-template>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <app-chatbot-assistant *ngIf="state.session"></app-chatbot-assistant>
</div>
